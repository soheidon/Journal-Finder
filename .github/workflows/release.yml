name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: npm run tauri build

      - name: Collect MSI artifact
        shell: pwsh
        working-directory: app
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.msi |
            Copy-Item -Destination dist-artifacts/
          Get-ChildItem dist-artifacts

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: app/dist-artifacts/*
          if-no-files-found: error

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: ./artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/windows/*
