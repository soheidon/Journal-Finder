name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app for macOS
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: --target universal-apple-darwin

      - name: Find build artifacts
        id: find-artifacts
        run: |
          echo "=== Looking for macOS build artifacts ==="
          find app/src-tauri/target -name "*.dmg" -o -name "*.app" -o -name "*.tar.gz" 2>/dev/null || true
          echo "=== Done ==="

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            app/src-tauri/target/**/*.dmg
            app/src-tauri/target/**/*.app
            app/src-tauri/target/**/*.tar.gz
          if-no-files-found: warn
