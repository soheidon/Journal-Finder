name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app for macOS
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz
          if-no-files-found: warn
