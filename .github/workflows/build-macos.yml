name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: npm run tauri build

      - name: Debug target tree
        if: always()
        working-directory: app
        run: |
          echo "PWD=$(pwd)"
          echo "Listing target directories:"
          find src-tauri/target -maxdepth 6 -type d | sort | sed -n '1,250p'
          echo "Finding files:"
          find src-tauri/target -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.app.tar.gz" \) -print | sort || true
          echo "Finding app bundles:"
          find src-tauri/target -type d -name "*.app" -print | sort || true

      - name: Collect macOS artifacts
        if: always()
        working-directory: app
        run: |
          set -eux
          rm -rf dist-artifacts
          mkdir -p dist-artifacts

          find src-tauri/target -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.app.tar.gz" \) -print -exec cp {} dist-artifacts/ \;

          find src-tauri/target -type d -name "*.app" -print | while read app; do
            name="$(basename "$app" .app)"
            ditto -c -k --sequesterRsrc --keepParent "$app" "dist-artifacts/${name}.app.zip"
          done

          echo "Collected artifacts:"
          ls -la dist-artifacts

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: app/dist-artifacts/*
          if-no-files-found: error
